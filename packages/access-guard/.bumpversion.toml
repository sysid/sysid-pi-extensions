[tool.bumpversion]
current_version = "1.0.1"
commit = true
tag = true
tag_name = "access-guard-v{new_version}"
tag_message = "Bump access-guard version: {current_version} → {new_version}"
message = "Bump access-guard version: {current_version} → {new_version}"

[[tool.bumpversion.files]]
filename = "VERSION"

[[tool.bumpversion.files]]
filename = "package.json"
search = "\"version\": \"{current_version}\""
replace = "\"version\": \"{new_version}\""
